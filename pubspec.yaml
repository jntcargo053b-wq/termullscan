name: termulscan
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── CORE ──────────────────────────────────────────────────────────────
  # Storage & Preferences
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Image Picker (Camera & Gallery)
  image_picker: ^1.1.2
  
  # Date Formatting
  intl: ^0.19.0
  
  # UUID Generator
  uuid: ^4.3.1
  
  # Device Info (untuk deteksi Android version)
  device_info_plus: ^9.1.0

  # ─── UI ────────────────────────────────────────────────────────────────
  # Spacing
  gap: ^3.0.1
  
  # Animations
  flutter_animate: ^4.5.0

  # ─── SCANNER ──────────────────────────────────────────────────────────
  # Barcode Scanner
  mobile_scanner: ^5.2.0

  # ─── GALLERY ──────────────────────────────────────────────────────────
  # Save to Gallery
  saver_gallery: ^3.0.0

  # ─── SHARE ────────────────────────────────────────────────────────────
  # Share files
  share_plus: ^9.0.0

  # ─── IMAGE PROCESSING ────────────────────────────────────────────────
  # Image manipulation (optional, jika digunakan)
  image: ^4.1.7

  # ─── SVG ──────────────────────────────────────────────────────────────
  # SVG Support
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    # Logo / Icon untuk watermark
    - assets/images/
    
    # Font (jika ada)
    # - assets/fonts/
  
  # Fonts (jika menggunakan custom font)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
