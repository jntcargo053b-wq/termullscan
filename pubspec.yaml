name: termulscan
description: Warehouse scanning application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  gap: ^3.0.1
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  http: ^1.2.1
  saver_gallery: 3.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

dependency_overrides:
  saver_gallery: 3.0.10
