name: termulscan
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── CORE ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.3.1
  device_info_plus: ^9.1.0

  # ─── UI ────────────────────────────────────────────────────────────────
  gap: ^3.0.1
  flutter_animate: ^4.5.0

  # ─── SCANNER ──────────────────────────────────────────────────────────
  mobile_scanner: ^5.2.0

  # ─── GALLERY ──────────────────────────────────────────────────────────
  saver_gallery: ^3.0.0

  # ─── SHARE ────────────────────────────────────────────────────────────
  share_plus: ^9.0.0

  # ─── IMAGE PROCESSING ────────────────────────────────────────────────
  image: ^4.1.7

  # ─── SVG ──────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1

  # ─── DATABASE ─────────────────────────────────────────────────────────
  sqflite: ^2.3.0
  path: ^1.9.0

  # ─── VIDEO ──────────────────────────────────────────────────────────
  camera: ^0.10.5+5
  video_player: ^2.8.5
  video_thumbnail: ^0.5.6
  ffmpeg_kit_flutter_new_full_gpl: ^2.3.2   # ← versi yang tersedia

  # ─── BACKUP & RESTORE ────────────────────────────────────────────────
  archive: ^3.6.1
  file_picker: ^8.0.0

  # ─── COLLECTION (untuk firstWhereOrNull) ────────────────────────────
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
