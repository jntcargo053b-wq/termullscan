name: termulscan
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.3.1
  device_info_plus: ^9.1.0

  gap: ^3.0.1
  flutter_animate: ^4.5.0

  mobile_scanner: ^5.2.0
  saver_gallery: ^3.0.0
  share_plus: ^9.0.0
  image: ^4.1.7
  sqflite: ^2.3.0
  path: ^1.9.0

  camera: ^0.10.5+5
  video_player: ^2.8.5
  video_thumbnail: ^0.5.6

  # ✅ Paket stabil – semua dependency ada di Maven Central
  ffmpeg_kit_flutter_new: ^4.1.0

  archive: ^3.6.1
  file_picker: ^8.0.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
